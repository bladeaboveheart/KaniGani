<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review — KaniGani</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar navbar--session">
    <a href="dashboard.html" class="btn btn--ghost btn--sm">← Dashboard</a>
    <span class="session-title">Sesi Review</span>
    <span class="session-progress" id="session-progress">0 tersisa</span>
  </header>

  <main class="session-main">
    <div id="loading" class="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Fase REVIEW -->
    <div id="phase-review" class="hidden">
      <div class="item-progress-bar">
        <div class="item-progress-fill" id="review-progress-fill" style="width: 0%"></div>
      </div>

      <div class="card" id="review-card">
        <div class="card-type-badge" id="review-type-badge">Radical</div>
        <div class="card-character" id="review-character">一</div>
        <div class="card-question" id="review-question-label">
          <span class="question-type" id="review-card-type">Arti</span>
        </div>
      </div>

      <div class="answer-area">
        <input
          type="text"
          id="review-input"
          class="review-input"
          placeholder="Ketik jawaban..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <div id="review-feedback" class="feedback hidden">
          <div id="review-feedback-text" class="feedback-text"></div>
          <div id="review-correct-answer" class="feedback-answer hidden"></div>
        </div>
        <div class="answer-actions">
          <button id="btn-review-submit" class="btn btn--primary">Jawab</button>
          <button id="btn-review-next" class="btn btn--ghost hidden">Lanjut →</button>
        </div>
      </div>
    </div>

    <!-- Fase RINGKASAN -->
    <div id="phase-summary" class="hidden">
      <div class="summary-card">
        <div class="summary-icon">📊</div>
        <h2 class="summary-title">Review Selesai!</h2>
        <p class="summary-subtitle">Progres SRS kamu telah diperbarui.</p>
        <div class="summary-stats">
          <div class="summary-stat">
            <div class="summary-stat-value" id="summary-correct">0</div>
            <div class="summary-stat-label">Benar</div>
          </div>
          <div class="summary-stat">
            <div class="summary-stat-value summary-stat-value--wrong" id="summary-wrong">0</div>
            <div class="summary-stat-label">Salah</div>
          </div>
          <div class="summary-stat">
            <div class="summary-stat-value" id="summary-accuracy">0%</div>
            <div class="summary-stat-label">Akurasi</div>
          </div>
        </div>
        <div id="summary-stage-changes" class="stage-changes"></div>
        <a href="dashboard.html" class="btn btn--primary btn--full">Kembali ke Dashboard</a>
      </div>
    </div>

    <!-- Empty State -->
    <div id="phase-empty" class="hidden">
      <div class="summary-card">
        <div class="summary-icon">✅</div>
        <h2 class="summary-title">Tidak ada review</h2>
        <p class="summary-subtitle">Semua review sudah selesai. Periksa kembali nanti!</p>
        <a href="dashboard.html" class="btn btn--primary btn--full">Kembali ke Dashboard</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { requireAuth } from './js/auth.js'
    import { getDueReviews, updateProgress, calculatePenalty, SRS_STAGE_NAMES } from './js/engine.js'

    let userId = null
    let queue = []
    let queueIndex = 0

    // State per item: { [itemId]: { wrongMeaning: 0, wrongReading: 0, meaningDone: bool, readingDone: bool, startStage: N } }
    let itemState = {}

    let totalCorrect = 0
    let totalWrong = 0
    let stageChanges = []

    async function init() {
      const user = await requireAuth()
      if (!user) return
      userId = user.id

      document.getElementById('loading').classList.remove('hidden')
      try {
        const reviews = await getDueReviews(userId)
        if (!reviews || reviews.length === 0) {
          showPhase('empty')
          return
        }

        queue = buildQueue(reviews)
        if (queue.length === 0) {
          showPhase('empty')
          return
        }

        showPhase('review')
        renderReviewCard()
      } catch (err) {
        console.error(err)
      } finally {
        document.getElementById('loading').classList.add('hidden')
      }
    }

    function buildQueue(reviews) {
      const cards = []
      for (const row of reviews) {
        const item = row.items
        const stage = row.srs_stage
        itemState[item.id] = {
          wrongMeaning: 0,
          wrongReading: 0,
          meaningDone: false,
          readingDone: item.type === 'radical',
          startStage: stage,
          item,
        }
        cards.push({ item, cardType: 'meaning' })
        if (item.type !== 'radical' && item.primary_reading) {
          cards.push({ item, cardType: 'reading' })
        }
      }
      return shuffle(cards)
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]]
      }
      return arr
    }

    function showPhase(name) {
      document.getElementById('loading').classList.add('hidden')
      document.getElementById('phase-review').classList.add('hidden')
      document.getElementById('phase-summary').classList.add('hidden')
      document.getElementById('phase-empty').classList.add('hidden')
      if (name === 'review') document.getElementById('phase-review').classList.remove('hidden')
      if (name === 'summary') document.getElementById('phase-summary').classList.remove('hidden')
      if (name === 'empty') document.getElementById('phase-empty').classList.remove('hidden')
    }

    function getTypeLabel(type) {
      if (type === 'radical') return 'Radical'
      if (type === 'kanji') return 'Kanji'
      return 'Kosakata'
    }

    function getTypeClass(type) {
      if (type === 'radical') return 'card--radical'
      if (type === 'kanji') return 'card--kanji'
      return 'card--vocab'
    }

    function renderReviewCard() {
      const remaining = queue.length - queueIndex
      document.getElementById('session-progress').textContent = `${remaining} tersisa`
      const pct = (queueIndex / queue.length) * 100
      document.getElementById('review-progress-fill').style.width = pct + '%'

      const { item, cardType } = queue[queueIndex]
      const card = document.getElementById('review-card')
      card.className = 'card ' + getTypeClass(item.type)
      document.getElementById('review-type-badge').textContent = getTypeLabel(item.type)
      document.getElementById('review-character').textContent = item.character
      document.getElementById('review-card-type').textContent = cardType === 'meaning' ? 'Arti' : 'Bacaan'

      const input = document.getElementById('review-input')
      input.value = ''
      input.className = 'review-input'
      input.disabled = false
      input.focus()

      document.getElementById('review-feedback').classList.add('hidden')
      document.getElementById('review-correct-answer').classList.add('hidden')
      document.getElementById('btn-review-submit').classList.remove('hidden')
      document.getElementById('btn-review-next').classList.add('hidden')
    }

    document.getElementById('btn-review-submit').addEventListener('click', submitReview)

    // Gunakan document-level listener agar Enter tetap berfungsi
    // setelah input di-disable (setelah submit jawaban)
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return
      const phaseReview = document.getElementById('phase-review')
      if (!phaseReview.classList.contains('hidden')) {
        const nextBtn = document.getElementById('btn-review-next')
        if (!nextBtn.classList.contains('hidden')) nextBtn.click()
        else submitReview()
      }
    })

    function normalizeAnswer(str) {
      return str.trim().toLowerCase()
    }

    function submitReview() {
      const { item, cardType } = queue[queueIndex]
      const input = document.getElementById('review-input')
      const userAnswer = normalizeAnswer(input.value)

      if (!userAnswer) {
        input.focus()
        return
      }

      const accepted = cardType === 'meaning' ? item.accepted_meanings : item.accepted_readings
      const isCorrect = accepted.includes(userAnswer)
      const state = itemState[item.id]

      const feedbackEl = document.getElementById('review-feedback')
      const feedbackText = document.getElementById('review-feedback-text')
      const correctAnswerEl = document.getElementById('review-correct-answer')

      if (isCorrect) {
        input.className = 'review-input review-input--correct'
        feedbackEl.className = 'feedback feedback--correct'
        feedbackText.textContent = 'Benar!'
        correctAnswerEl.classList.add('hidden')
        totalCorrect++

        if (cardType === 'meaning') state.meaningDone = true
        else state.readingDone = true
      } else {
        input.className = 'review-input review-input--wrong'
        feedbackEl.className = 'feedback feedback--wrong'
        feedbackText.textContent = 'Salah!'
        const correctDisplay = cardType === 'meaning' ? item.primary_meaning : item.primary_reading
        correctAnswerEl.textContent = `Jawaban benar: ${correctDisplay}`
        correctAnswerEl.classList.remove('hidden')
        totalWrong++

        if (cardType === 'meaning') state.wrongMeaning++
        else state.wrongReading++

        queue.push({ item, cardType })
      }

      feedbackEl.classList.remove('hidden')
      input.disabled = true
      document.getElementById('btn-review-submit').classList.add('hidden')
      document.getElementById('btn-review-next').classList.remove('hidden')
    }

    document.getElementById('btn-review-next').addEventListener('click', async () => {
      const { item } = queue[queueIndex]
      const state = itemState[item.id]

      if (state.meaningDone && state.readingDone) {
        const totalWrongForItem = state.wrongMeaning + state.wrongReading
        const startStage = state.startStage
        let newStage

        if (totalWrongForItem === 0) {
          newStage = Math.min(9, startStage + 1)
        } else {
          newStage = calculatePenalty(startStage, totalWrongForItem)
        }

        if (newStage !== startStage) {
          stageChanges.push({
            item,
            from: startStage,
            to: newStage,
          })
        }

        try {
          await updateProgress(userId, item.id, newStage)
        } catch (err) {
          console.error('Gagal update progress:', err)
        }

        delete itemState[item.id]
      }

      queueIndex++
      if (queueIndex >= queue.length) {
        finishReview()
      } else {
        renderReviewCard()
      }
    })

    function finishReview() {
      showPhase('summary')
      const total = totalCorrect + totalWrong
      const accuracy = total > 0 ? Math.round((totalCorrect / total) * 100) : 0

      document.getElementById('summary-correct').textContent = totalCorrect
      document.getElementById('summary-wrong').textContent = totalWrong
      document.getElementById('summary-accuracy').textContent = accuracy + '%'

      const changesEl = document.getElementById('summary-stage-changes')
      if (stageChanges.length > 0) {
        const html = stageChanges.map((c) => {
          const dir = c.to > c.from ? 'naik' : 'turun'
          const cls = c.to > c.from ? 'stage-up' : 'stage-down'
          return `<div class="stage-change ${cls}">
            <span class="stage-char">${c.item.character}</span>
            <span class="stage-arrow">${SRS_STAGE_NAMES[c.from]} → ${SRS_STAGE_NAMES[c.to]}</span>
          </div>`
        }).join('')
        changesEl.innerHTML = `<h3 class="stage-changes-title">Perubahan Stage</h3>${html}`
      }
    }

    init()
  </script>
</body>
</html>
